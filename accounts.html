            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: #0D0D0D;
            color: #CCCCCC;
            line-height: 1.6;
        }

        a {

            transition: opacity 0.2s ease;
        }

        a:hover {

        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 52px 40px 80px;
        }

        /* Header */
        .header {
            margin-bottom: 52px;
        }

        .eyebrow {

            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #515FFC;
            margin-bottom: 12px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .last-updated {
            font-size: 12px;
            color: #777;
            margin-bottom: 20px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            font-size: 13px;
        }

        .nav-links a {
            color: #888;
        }

        .nav-links a.active {
            color: #FFFFFF;
            font-weight: 600;
        }

        /* Summary stats bar */
        .summary-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1E1E1E;
            border: 1px solid #303030;
            border-radius: 12px;
            padding: 16px;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            border-color: #404040;
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #FFFFFF;
        }

        /* Filters */
        .filters-section {
            margin-bottom: 40px;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
            display: block;
        }

        .filter-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-pill {
            padding: 6px 12px;
            border: 1px solid #303030;
            border-radius: 20px;
            background: transparent;
            color: #888;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-pill:hover {
            border-color: #515FFC;
            color: #515FFC;
        }

        .filter-pill.active {
            background: #515FFC;
            border-color: #515FFC;
            color: #FFFFFF;
        }

        .filter-pill.stage-2.active { background: #E05010; border-color: #E05010; }

        .filter-pill.stage-3 { border-color: rgba(212, 160, 16, 0.3); }
        .filter-pill.stage-3.active { background: #D4A010; border-color: #D4A010; }

        .filter-pill.stage-4.active { background: #88B830; border-color: #88B830; }

        .filter-pill.stage-5.active { background: #40A840; border-color: #40A840; }

        .accounts-section.active {

        .stage-section {

            font-weight: 600;
            color: #FFFFFF;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .stage-count {

            color: #777;
            margin-left: auto;
        }

        }

            color: #777;
            white-space: nowrap;
            overflow: hidden;

            font-size: 9px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
        }

        .value-cell {
            font-size: 11px;
            font-weight: 600;
            color: #AAAAAA;
            white-space: nowrap;
        }

        .advisor-cell {

            color: #999;
            white-space: nowrap;

            height: 7px;
            border-radius: 50%;

            font-weight: 700;

            justify-content: center;

            color: #777;
            margin-left: auto;
        }

        .other-content {
            display: none;
            margin-top: 16px;

        }

            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: #CCCCCC;
            text-align: center;
            transition: all 0.2s ease;

            border-color: #515FFC;
            transform: translateY(-1px);

            padding: 40px 20px;
            color: #777;

                gap: 12px;
            }

            .account-card, .row-header {
                grid-template-columns: 1fr;
                gap: 4px;
            }
            .row-header { display: none; }
            .account-card { padding: 12px; }

            .nav-links {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>

            'Arcmont', 'Armourcap', 'Armstrong World Industries', 'Azets', 'Brighthouse Financial',
            'Cambrex', 'Capita', 'Carter\'s', 'Cerity Partners', 'Corus International', 'Covista',
            'Crane NXT', 'CSG Systems', 'DVC', 'East West Bank', 'Escentric', 'Evercore', 'EWOB',
            'Hexion', 'Ketjen', 'Korn Ferry', 'Lazard', 'Manning Napier', 'Marks and Spencer',
            'Mission Produce', 'Moelis & Company', 'Momentive', 'Novant Health', 'Officiate',
            'OneRock', 'Paragon', 'Paycor', 'Port of Seattle', 'Porto Seguro', 'SJP', 'Suvoda',
            'Suzano', 'Renner', 'IRB(RE)', 'T-Mobile', 'TBC Bank', 'The Trade Desk', 'TP ICAP',
            'Vesuvius', 'Virgin Media O2', 'Vodafone', 'Wayfair', 'Weatherford', 'Woodward', 'WTW'
        ];

        // ====================
        // STATE & FILTERS
        // ====================
        let currentStageFilter = 'all';
        let currentRegionFilter = 'all';

        // ====================
        // STAGE CONFIGURATION
        // ====================
        const stageConfig = {
            0: { name: 'Dead / Stalled', color: '#E0392B' },
            1: { name: '01 Intro', color: '#CC2200' },
            2: { name: '02 Discovery', color: '#E05010' },
            3: { name: '03 POC', color: '#D4A010' },
            4: { name: '04 Proposal', color: '#88B830' },
            5: { name: '05 Procurement', color: '#40A840' },
        };

        // ====================
        // FILTERING & RENDERING
        // ====================
        function getFilteredAccounts() {
            return accounts.filter(account => {
                const stageMatch = currentStageFilter === 'all' || account.stage === parseInt(currentStageFilter);
                const regionMatch = currentRegionFilter === 'all' || account.region === currentRegionFilter;
                return stageMatch && regionMatch;
            });
        }

        function getAccountsByStage() {
            const filtered = getFilteredAccounts();
            const grouped = {};

            Object.keys(stageConfig).forEach(stage => {
                grouped[stage] = [];
            });

            filtered.forEach(account => {
                if (!grouped[account.stage]) {
                    grouped[account.stage] = [];
                }
                grouped[account.stage].push(account);
            });

            // Sort within each stage: at-risk first, then active
            Object.keys(grouped).forEach(stage => {
                grouped[stage].sort((a, b) => {
                    const statusOrder = { 'at-risk': 0, 'stalled': 1, 'active': 2, 'dead': 3 };
                    return (statusOrder[a.status] || 99) - (statusOrder[b.status] || 99);
                });
            });

            return grouped;
        }

        function renderAccounts() {
            const container = document.getElementById('accountsContainer');
            const accountsByStage = getAccountsByStage();
            let html = '';

            Object.keys(stageConfig).forEach(stage => {
                const stageAccounts = accountsByStage[stage];
                if (stageAccounts.length === 0) return;

                const config = stageConfig[stage];
                html += `
                    <div class="stage-section">
                        <div class="stage-header">
                            <div class="stage-stripe" style="background: ${config.color};"></div>
                            <div class="stage-title">${config.name}</div>
                            <div class="stage-count">${stageAccounts.length} ${stageAccounts.length === 1 ? 'account' : 'accounts'}</div>
                        </div>
                        <div class="row-header">
                            <span>Account</span><span>Project</span><span>Region</span><span>Value</span><span>Advisor</span><span>Last</span><span>Source</span><span></span>
                        </div>
                        <div class="accounts-grid">
                            ${stageAccounts.map(account => renderAccountCard(account)).join('')}
                        </div>
                    </div>
                `;
            });

            if (html === '') {
                html = '<div class="empty-state"><p>No accounts match the selected filters.</p></div>';
            }

            container.innerHTML = html;
        }

        function renderAccountCard(account) {
            const statusDotClass = account.status === 'at-risk' || account.status === 'stalled' ? 'at-risk' : account.status;
            const valueDisplay = account.value !== 'TBC' ? account.value : '—';
            const src = (account.source || 'Other').toLowerCase();
            const srcClass = src.includes('intel') ? 'intel' : src.includes('email') ? 'email' : src.includes('airtable') ? 'airtable' : src.includes('whatsapp') ? 'whatsapp' : src.includes('call') ? 'call' : 'other';

            return `
                <div class="account-card">
                    <div class="account-name" title="${account.name}">${account.name}</div>
                    <div class="account-project" title="${account.project}">${account.project}</div>
                    <span class="region-pill">${account.region}</span>
                    <div class="value-cell">${valueDisplay}</div>
                    <div class="advisor-cell" title="${account.champion}">${account.champion}</div>
                    <div class="activity-cell">${account.lastActivity}</div>
                    <span class="source-pill ${srcClass}">${account.source || 'Other'}</span>
                    <div class="status-dot ${statusDotClass}"></div>
                </div>
            `;
        }

        function updateStats() {
            const filtered = getFilteredAccounts();
            const total = filtered.length;
            const preCom = filtered.filter(a => a.stage >= 1 && a.stage <= 3).length;
            const com = filtered.filter(a => a.stage >= 4 && a.stage <= 5).length;
            const atRisk = filtered.filter(a => a.status === 'at-risk').length;
            const stalled = filtered.filter(a => a.status === 'stalled' || a.status === 'dead').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('preComCount').textContent = preCom;
            document.getElementById('comCount').textContent = com;
            document.getElementById('atRiskCount').textContent = atRisk;
            document.getElementById('stalledCount').textContent = stalled;
        }

        // ====================
        // OTHER/UNQUALIFIED
        // ====================
        function renderOtherAccounts() {
            const grid = document.getElementById('otherGrid');
            grid.innerHTML = otherAccounts.map(name => `<div class="other-item">${name}</div>`).join('');
            document.getElementById('otherCount').textContent = otherAccounts.length;
        }

        document.getElementById('otherToggle').addEventListener('click', () => {
            const toggle = document.querySelector('.other-toggle');
            const content = document.getElementById('otherContent');
            toggle.classList.toggle('collapsed');
            content.classList.toggle('active');
        });

        // ====================
        // EVENT LISTENERS
        // ====================
        document.addEventListener('DOMContentLoaded', () => {
            // Stage filters
            document.querySelectorAll('[data-filter="stage"]').forEach(pill => {
                pill.addEventListener('click', (e) => {
                    document.querySelectorAll('[data-filter="stage"]').forEach(p => p.classList.remove('active'));
                    e.target.classList.add('active');
                    currentStageFilter = e.target.dataset.value;
                    renderAccounts();
                    updateStats();
                });
            });

            // Region filters
            document.querySelectorAll('[data-filter="region"]').forEach(pill => {
                pill.addEventListener('click', (e) => {
                    document.querySelectorAll('[data-filter="region"]').forEach(p => p.classList.remove('active'));
                    e.target.classList.add('active');
                    currentRegionFilter = e.target.dataset.value;
                    renderAccounts();
                    updateStats();
                });
            });

            // Initial render
            renderAccounts();
            renderOtherAccounts();
            updateStats();
        });
    </script>
</body>
</html>
