<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Pipeline Status — Conquer AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0D0D0D;
            color: #CCCCCC;
            font-family: 'Geist', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        header {
            margin-bottom: 40px;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #515FFC;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #FFFFFF;
        }

        .subtitle {
            font-size: 14px;
            color: #888888;
            margin-bottom: 24px;
        }

        /* Navigation */
        nav {
            display: flex;
            gap: 32px;
            border-bottom: 1px solid #2A2A2A;
            padding-bottom: 16px;
            margin-bottom: 40px;
        }

        nav a {
            text-decoration: none;
            color: #888888;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
            position: relative;
        }

        nav a:hover {
            color: #CCCCCC;
        }

        nav a.active {
            color: #515FFC;
        }

        nav a.active::after {
            content: '';
            position: absolute;
            bottom: -17px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: #515FFC;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #515FFC;
            box-shadow: 0 0 20px rgba(81, 95, 252, 0.15);
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #888888;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #FFFFFF;
        }

        /* Filters Section */
        .filters-section {
            margin-bottom: 40px;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #888888;
            margin-bottom: 12px;
            display: block;
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .pill {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #2A2A2A;
            background-color: transparent;
            color: #CCCCCC;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pill:hover {
            border-color: #515FFC;
            color: #FFFFFF;
        }

        .pill.active {
            background-color: #515FFC;
            border-color: #515FFC;
            color: #FFFFFF;
        }

        /* Search Input */
        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 16px;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            background-color: #1A1A1A;
            color: #CCCCCC;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #515FFC;
            box-shadow: 0 0 12px rgba(81, 95, 252, 0.2);
        }

        .search-input::placeholder {
            color: #666666;
        }

        /* Stage Sections */
        .stage-section {
            margin-bottom: 40px;
        }

        .stage-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #2A2A2A;
        }

        .stage-stripe {
            width: 6px;
            height: 32px;
            border-radius: 3px;
            margin-right: 16px;
        }

        .stage-title {
            font-size: 16px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .stage-count {
            font-size: 14px;
            color: #888888;
            margin-left: 8px;
        }

        /* Table — desktop-first, proper table layout */
        .accounts-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .table-header th {
            background-color: #1A1A1A;
            padding: 12px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #888888;
            border-bottom: 1px solid #2A2A2A;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s ease;
            white-space: nowrap;
        }

        .table-header th:hover {
            color: #CCCCCC;
        }

        .sort-indicator {
            margin-left: 4px;
            font-size: 10px;
        }

        /* Column widths */
        .accounts-table th:nth-child(1),
        .accounts-table td.account-name { width: 16%; }
        .accounts-table th:nth-child(2),
        .accounts-table td.account-project { width: 28%; }
        .accounts-table th:nth-child(3),
        .accounts-table td.account-region { width: 8%; }
        .accounts-table th:nth-child(4),
        .accounts-table td.account-value { width: 10%; }
        .accounts-table th:nth-child(5),
        .accounts-table td.account-advisor { width: 16%; }
        .accounts-table th:nth-child(6),
        .accounts-table td.account-last { width: 8%; }
        .accounts-table th:nth-child(7),
        .accounts-table td.account-source { width: 10%; }

        .account-row {
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .account-row:hover {
            background-color: #1A1A1A;
        }

        .account-row td {
            padding: 12px;
            border-bottom: 1px solid #1E1E1E;
            font-size: 13px;
            vertical-align: middle;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .account-row td.account-name {
            font-weight: 600;
            color: #FFFFFF;
            white-space: normal;
        }

        .account-row td.account-project {
            color: #AAAAAA;
            white-space: normal;
            font-size: 12px;
        }

        .account-row td.account-region {
            color: #888888;
            font-size: 12px;
        }

        .account-row td.account-value {
            font-weight: 600;
            color: #FFFFFF;
        }

        .account-row td.account-advisor {
            color: #AAAAAA;
            white-space: normal;
            font-size: 12px;
        }

        .account-row td.account-last {
            color: #888888;
            font-size: 12px;
        }

        /* Mobile: convert table to card layout */
        @media (max-width: 767px) {
            .accounts-table,
            .accounts-table thead,
            .accounts-table tbody,
            .accounts-table tr,
            .accounts-table th,
            .accounts-table td {
                display: block;
            }

            .table-header {
                display: none !important;
            }

            .account-row {
                border: 1px solid #2A2A2A;
                border-radius: 8px;
                margin-bottom: 10px;
                background-color: #161616;
                padding: 12px;
            }

            .account-row td {
                padding: 2px 0;
                border-bottom: none;
                white-space: normal;
            }

            .account-row td.account-region,
            .account-row td.account-source {
                display: none;
            }

            .account-row td::before {
                content: attr(data-label);
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: #666666;
                display: block;
                margin-bottom: 2px;
            }

            .account-row td.account-name::before { content: none; }

            .details-row td {
                padding: 0 !important;
            }
        }

        .cell-label {
            display: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #888888;
            margin-bottom: 4px;
        }

        @media (max-width: 767px) {
            .cell-label {
                display: block;
            }
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .status-active {
            background-color: #40A840;
        }

        .status-at-risk,
        .status-stalled {
            background-color: #D4A010;
        }

        .status-dead {
            background-color: #E0392B;
        }

        /* Additional cell styles already defined in table section above */

        .source-pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            width: fit-content;
        }

        .source-intel {
            background-color: rgba(81, 95, 252, 0.2);
            color: #7B8FFF;
        }

        .source-call {
            background-color: rgba(147, 51, 234, 0.2);
            color: #BB86FC;
        }

        .source-whatsapp {
            background-color: rgba(64, 168, 64, 0.2);
            color: #5FD35F;
        }

        .source-email {
            background-color: rgba(255, 165, 0, 0.2);
            color: #FFB84D;
        }

        /* Details row */
        .details-row {
            background-color: transparent;
        }

        .details-row td {
            padding: 0 !important;
            border-bottom: none;
        }

        /* Expanded Details Panel */
        .details-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background-color: #1A1A1A;
            border-top: 1px solid #2A2A2A;
        }

        .details-panel.expanded {
            max-height: 1000px;
        }

        .details-content {
            padding: 20px;
        }

        .detail-note {
            margin-bottom: 20px;
        }

        .detail-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #888888;
            margin-bottom: 8px;
        }

        .detail-text {
            color: #CCCCCC;
            line-height: 1.6;
        }

        .timeline {
            margin-top: 20px;
        }

        .timeline-item {
            display: flex;
            margin-bottom: 16px;
            position: relative;
            padding-left: 20px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            width: 8px;
            height: 8px;
            background-color: #515FFC;
            border-radius: 50%;
            border: 2px solid #0D0D0D;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            left: 3px;
            top: 14px;
            width: 2px;
            height: calc(100% + 8px);
            background-color: #2A2A2A;
        }

        .timeline-item:last-child::after {
            display: none;
        }

        .timeline-text {
            color: #999999;
            font-size: 13px;
        }

        .timeline-text strong {
            color: #CCCCCC;
        }

        /* Other/Unqualified Section */
        .other-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid #2A2A2A;
        }

        .other-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            user-select: none;
        }

        .toggle-arrow {
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: #2A2A2A;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: transform 0.2s ease;
        }

        .toggle-arrow.expanded {
            transform: rotate(90deg);
        }

        .other-title {
            font-size: 16px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .other-count {
            font-size: 14px;
            color: #888888;
        }

        .other-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .other-pills.expanded {
            max-height: 500px;
        }

        .other-pill {
            padding: 6px 12px;
            border-radius: 16px;
            background-color: #2A2A2A;
            color: #CCCCCC;
            font-size: 12px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            h1 {
                font-size: 28px;
            }

            nav {
                gap: 16px;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-card {
                padding: 16px;
            }

            .stat-value {
                font-size: 24px;
            }
        }
    </style>
</head>

        const otherAccounts = ['Arcmont', 'Armourcap', 'Armstrong World Industries', 'Azets', 'Brighthouse Financial', 'Cambrex', 'Capita', 'Carter\'s', 'Cerity Partners', 'Corus International', 'Covista', 'Crane NXT', 'CSG Systems', 'DVC', 'East West Bank', 'Escentric', 'Evercore', 'EWOB', 'Hexion', 'Ketjen', 'Korn Ferry', 'Lazard', 'Manning Napier', 'Marks and Spencer', 'Mission Produce', 'Moelis & Company', 'Momentive', 'Novant Health', 'Officiate', 'OneRock', 'Paragon', 'Port of Seattle', 'Porto Seguro', 'SJP', 'Suvoda', 'Suzano', 'Renner', 'IRB(RE)', 'T-Mobile', 'TBC Bank', 'The Trade Desk', 'TP ICAP', 'Vesuvius', 'Virgin Media O2', 'Vodafone', 'Wayfair', 'Weatherford', 'Woodward', 'WTW'];

        let filteredAccounts = JSON.parse(JSON.stringify(allAccounts));
        let currentSort = { column: null, asc: true };
        let activeStageFilter = 'all';
        let activeRegionFilter = 'all';
        let searchTerm = '';

        function getSourceClass(source) {
            if (source === 'Intel') return 'source-intel';
            if (source === 'Call transcript') return 'source-call';
            if (source === 'WhatsApp') return 'source-whatsapp';
            if (source === 'Email') return 'source-email';
            return 'source-intel';
        }

        function getStatusClass(status) {
            if (status === 'active') return 'status-active';
            if (status === 'at-risk' || status === 'stalled') return 'status-at-risk';
            return 'status-dead';
        }

        function applyFilters() {
            filteredAccounts = JSON.parse(JSON.stringify(allAccounts));

            Object.keys(filteredAccounts).forEach(stage => {
                filteredAccounts[stage] = filteredAccounts[stage].filter(account => {
                    const matchesStage = activeStageFilter === 'all' || (activeStageFilter === 'dead' ? ['dead', ''].includes(stage) : stage === activeStageFilter);
                    const matchesRegion = activeRegionFilter === 'all' || account.region === activeRegionFilter;
                    const matchesSearch = searchTerm === '' ||
                        account.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        account.project.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        account.champion.toLowerCase().includes(searchTerm.toLowerCase());

                    return matchesStage && matchesRegion && matchesSearch;
                });
            });

            if (currentSort.column) {
                applySorting();
            }
            render();
        }

        function applySorting() {
            const column = currentSort.column;
            const asc = currentSort.asc;

            Object.keys(filteredAccounts).forEach(stage => {
                filteredAccounts[stage].sort((a, b) => {
                    let aVal = a[column];
                    let bVal = b[column];

                    if (typeof aVal === 'string') {
                        aVal = aVal.toLowerCase();
                        bVal = bVal.toLowerCase();
                    }

                    if (aVal < bVal) return asc ? -1 : 1;
                    if (aVal > bVal) return asc ? 1 : -1;
                    return 0;
                });
            });
        }

        function toggleSort(column) {
            if (currentSort.column === column) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.column = column;
                currentSort.asc = true;
            }
            applyFilters();
        }

        function renderTableHeader() {
            const sortIndicator = (col) => {
                if (currentSort.column !== col) return '';
                return `<span class="sort-indicator">${currentSort.asc ? '▲' : '▼'}</span>`;
            };

            return `
                <tr class="table-header">
                    <th onclick="toggleSort('name')">Account ${sortIndicator('name')}</th>
                    <th onclick="toggleSort('project')">Project ${sortIndicator('project')}</th>
                    <th onclick="toggleSort('region')">Region ${sortIndicator('region')}</th>
                    <th onclick="toggleSort('value')">Value ${sortIndicator('value')}</th>
                    <th onclick="toggleSort('champion')">Advisor ${sortIndicator('champion')}</th>
                    <th onclick="toggleSort('lastActivity')">Last ${sortIndicator('lastActivity')}</th>
                    <th onclick="toggleSort('source')">Source ${sortIndicator('source')}</th>
                </tr>
            `;
        }

        function renderAccount(account, stage) {
            const statusClass = getStatusClass(account.status);
            const sourceClass = getSourceClass(account.source);

            return `
                <tbody class="account-table">
                    <tr class="account-row" onclick="toggleDetails(this)">
                        <td class="row-cell account-name" data-label="Account">
                            <span class="status-dot ${statusClass}"></span>${account.name}
                        </td>
                        <td class="row-cell account-project" data-label="Project">${account.project}</td>
                        <td class="row-cell account-region" data-label="Region">${account.region}</td>
                        <td class="row-cell account-value" data-label="Value">${account.value}</td>
                        <td class="row-cell account-advisor" data-label="Advisor">${account.champion}</td>
                        <td class="row-cell account-last" data-label="Last">${account.lastActivity}</td>
                        <td class="row-cell account-source" data-label="Source">
                            <span class="source-pill ${sourceClass}">${account.source}</span>
                        </td>
                    </tr>
                    <tr class="details-row">
                        <td colspan="7">
                            <div class="details-panel">
                                <div class="details-content">
                                    <div class="detail-note">
                                        <div class="detail-label">Note</div>
                                        <div class="detail-text">${account.note}</div>
                                    </div>
                                    <div class="timeline">
                                        <div class="detail-label">Activity Timeline</div>
                                        ${account.timeline.map(item => `<div class="timeline-item"><div class="timeline-text">${item}</div></div>`).join('')}
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            `;
        }

        function toggleDetails(row) {
            const panel = row.nextElementSibling.querySelector('.details-panel');
            panel.classList.toggle('expanded');
        }

        function calculateStats() {
            let totalActive = 0;
            let preCommercial = 0;
            let commercial = 0;
            let atRisk = 0;
            let stalledDead = 0;

            Object.keys(filteredAccounts).forEach(stage => {
                filteredAccounts[stage].forEach(account => {
                    if (account.status === 'dead' || account.status === 'stalled') {
                        stalledDead++;
                    } else {
                        totalActive++;
                        if (['01', '02', '03'].includes(stage)) preCommercial++;
                        if (['04', '05'].includes(stage)) commercial++;
                    }
                    if (account.status === 'at-risk') atRisk++;
                });
            });

            document.getElementById('statTotalActive').textContent = totalActive;
            document.getElementById('statPreCommercial').textContent = preCommercial;
            document.getElementById('statCommercial').textContent = commercial;
            document.getElementById('statAtRisk').textContent = atRisk;
            document.getElementById('statStalledDead').textContent = stalledDead;
        }

        function render() {
            const container = document.getElementById('stagesContainer');
            let html = '';

            const stageOrder = ['05', '04', '03', '02', '01', 'dead'];
            stageOrder.forEach(stage => {
                const accounts = filteredAccounts[stage];
                if (accounts.length === 0) return;

                const color = stageColors[stage];
                const name = stageNames[stage];

                html += `
                    <div class="stage-section">
                        <div class="stage-header">
                            <div class="stage-stripe" style="background-color: ${color}"></div>
                            <div class="stage-title">${name}</div>
                            <div class="stage-count">(${accounts.length})</div>
                        </div>
                        <table class="accounts-table">
                            ${renderTableHeader()}
                            ${accounts.map(acc => renderAccount(acc, stage)).join('')}
                        </table>
                    </div>
                `;
            });

            container.innerHTML = html;
            calculateStats();
        }

        function renderOther() {
            const container = document.getElementById('otherPills');
            container.innerHTML = otherAccounts.map(name => `<div class="other-pill">${name}</div>`).join('');
            document.getElementById('otherCount').textContent = `(${otherAccounts.length})`;
        }

        document.getElementById('otherToggle').addEventListener('click', () => {
            const pills = document.getElementById('otherPills');
            const arrow = document.getElementById('otherArrow');
            pills.classList.toggle('expanded');
            arrow.classList.toggle('expanded');
        });

        document.querySelectorAll('[data-filter="stage"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('[data-filter="stage"]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                activeStageFilter = e.target.dataset.value;
                applyFilters();
            });
        });

        document.querySelectorAll('[data-filter="region"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('[data-filter="region"]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                activeRegionFilter = e.target.dataset.value;
                applyFilters();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            applyFilters();
        });

        render();
        renderOther();
    </script>
