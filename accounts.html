<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Pipeline Status — Conquer AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* === Conquer Intel Design System v1.0 === */
        /* Dark Scale */
        :root {
            --bg: #0A0A0A;
            --bg-light: #141414;
            --pop: #1F1F1F;
            --pop-on-pop: #2B2B2B;
            --stroke: #3C3C3C;
            --shortcut: #616161;
            /* Light Scale */
            --white: #FFFFFF;
            --text: #D3D3D3;
            --titles: #AEAEAE;
            --icons: #858585;
            /* Accents */
            --accent: #37A584;
            --accent-hover: #2E8A6E;
            --red: #EC3540;
            --grey-blue: #6D7287;
            /* Radius */
            --radius: 5px;
            --radius-pill: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Geist', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        header {
            margin-bottom: 40px;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--accent);
            margin-bottom: 12px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--white);
        }

        .subtitle {
            font-size: 14px;
            color: var(--titles);
            margin-bottom: 24px;
        }

        /* Navigation */
        nav {
            display: flex;
            gap: 32px;
            border-bottom: 1px solid var(--pop);
            padding-bottom: 16px;
            margin-bottom: 40px;
        }

        nav a {
            text-decoration: none;
            color: var(--icons);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
            position: relative;
        }

        nav a:hover {
            color: var(--text);
        }

        nav a.active {
            color: var(--accent);
        }

        nav a.active::after {
            content: '';
            position: absolute;
            bottom: -17px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--accent);
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: var(--bg-light);
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;}

        .stat-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(55, 165, 132, 0.15);
        }

        .stat-card.active {
            border-color: var(--accent);
            background-color: rgba(55, 165, 132, 0.08);
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--titles);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--white);
        }

        /* Filters Section */
        .filters-section {
            margin-bottom: 40px;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--titles);
            margin-bottom: 12px;
            display: block;
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .pill {
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--stroke);
            background-color: transparent;
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pill:hover {
            border-color: var(--accent);
            color: var(--white);
        }

        .pill.active {
            background-color: var(--accent);
            border-color: var(--accent);
            color: var(--white);
        }

        /* Search Input */
        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 16px;
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            background-color: var(--bg-light);
            color: var(--text);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(55, 165, 132, 0.2);
        }

        .search-input::placeholder {
            color: var(--shortcut);
        }

        /* Stage Sections */
        .stage-section {
            margin-bottom: 40px;
        }

        .stage-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--pop);
        }

        .stage-stripe {
            width: 4px;
            height: 28px;
            border-radius: 2px;
            margin-right: 16px;
        }

        .stage-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--white);
        }

        .stage-count {
            font-size: 14px;
            color: var(--titles);
            margin-left: 8px;
        }

        /* Table — desktop-first, proper table layout */
        .accounts-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .table-header th {
            background-color: var(--bg-light);
            padding: 12px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--icons);
            border-bottom: 1px solid var(--stroke);
            cursor: pointer;
            user-select: none;
            transition: color 0.2s ease;
            white-space: nowrap;
        }

        .table-header th:hover {
            color: var(--text);
        }

        .sort-indicator {
            margin-left: 4px;
            font-size: 10px;
        }

        /* Column widths */
        .accounts-table th:nth-child(1),
        .accounts-table td.account-name { width: 16%; }
        .accounts-table th:nth-child(2),
        .accounts-table td.account-project { width: 28%; }
        .accounts-table th:nth-child(3),
        .accounts-table td.account-region { width: 8%; }
        .accounts-table th:nth-child(4),
        .accounts-table td.account-value { width: 10%; }
        .accounts-table th:nth-child(5),
        .accounts-table td.account-advisor { width: 16%; }
        .accounts-table th:nth-child(6),
        .accounts-table td.account-last { width: 8%; }
        .accounts-table th:nth-child(7),
        .accounts-table td.account-source { width: 10%; }

        .account-row {
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .account-row:hover {
            background-color: var(--bg-light);
        }

        .account-row td {
            padding: 12px;
            border-bottom: 1px solid var(--pop);
            font-size: 13px;
            vertical-align: middle;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .account-row td.account-name {
            font-weight: 600;
            color: var(--white);
            white-space: normal;
        }

        .account-row td.account-project {
            color: var(--titles);
            white-space: normal;
            font-size: 12px;
        }

        .account-row td.account-region {
            color: var(--icons);
            font-size: 12px;
        }

        .account-row td.account-value {
            font-weight: 600;
            color: var(--accent);
        }

        .account-row td.account-advisor {
            color: var(--titles);
            white-space: normal;
            font-size: 12px;
        }

        .account-row td.account-last {
            color: var(--icons);
            font-size: 12px;
        }

        /* Mobile: convert table to card layout */
        @media (max-width: 767px) {
            .accounts-table,
            .accounts-table thead,
            .accounts-table tbody,
            .accounts-table tr,
            .accounts-table th,
            .accounts-table td {
                display: block;
            }

            .table-header {
                display: none !important;
            }

            .account-row {
                border: 1px solid var(--stroke);
                border-radius: var(--radius);
                margin-bottom: 10px;
                background-color: var(--bg-light);
                padding: 12px;
            }

            .account-row td {
                padding: 2px 0;
                border-bottom: none;
                white-space: normal;
            }

            .account-row td.account-region,
            .account-row td.account-source {
                display: none;
            }

            .account-row td::before {
                content: attr(data-label);
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: var(--shortcut);
                display: block;
                margin-bottom: 2px;
            }

            .account-row td.account-name::before { content: none; }

            .details-row td {
                padding: 0 !important;
            }
        }

        .cell-label {
            display: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--icons);
            margin-bottom: 4px;
        }

        @media (max-width: 767px) {
            .cell-label {
                display: block;
            }
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .status-active {
            background-color: var(--accent);
        }

        .status-at-risk,
        .status-stalled {
            background-color: #E5A100;
        }

        .status-dead {
            background-color: var(--red);
        }

        /* Additional cell styles already defined in table section above */

        .source-pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            width: fit-content;
        }

        .source-intel {
            background-color: rgba(55, 165, 132, 0.15);
            color: var(--accent);
        }

        .source-call {
            background-color: rgba(109, 114, 135, 0.2);
            color: #9DA2B9;
        }

        .source-whatsapp {
            background-color: rgba(55, 165, 132, 0.1);
            color: #5FD35F;
        }

        .source-email {
            background-color: rgba(255, 165, 0, 0.15);
            color: #FFB84D;
        }

        /* Details row */
        .details-row {
            background-color: transparent;
        }

        .details-row td {
            padding: 0 !important;
            border-bottom: none;
        }

        /* Expanded Details Panel */
        .details-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background-color: var(--bg-light);
            border-top: 1px solid var(--pop);
        }

        .details-panel.expanded {
            max-height: 1500px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--pop);
        }
        .detail-grid-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .detail-grid-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--icons);
        }
        .detail-grid-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--white);
        }
        @media (max-width: 767px) {
            .detail-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .details-content {
            padding: 20px;
        }

        .detail-note {
            margin-bottom: 20px;
        }

        .detail-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--icons);
            margin-bottom: 8px;
        }

        .detail-text {
            color: var(--text);
            line-height: 1.6;
        }

        .timeline {
            margin-top: 20px;
        }

        .timeline-item {
            display: flex;
            margin-bottom: 16px;
            position: relative;
            padding-left: 20px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            border: 2px solid var(--bg);
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            left: 3px;
            top: 14px;
            width: 2px;
            height: calc(100% + 8px);
            background-color: var(--pop-on-pop);
        }

        .timeline-item:last-child::after {
            display: none;
        }

        .timeline-text {
            color: var(--titles);
            font-size: 13px;
        }

        .timeline-text strong {
            color: var(--text);
        }

        /* Other/Unqualified Section */
        .other-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid var(--pop);
        }

        .other-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            user-select: none;
        }

        .toggle-arrow {
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: var(--pop-on-pop);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--icons);
            transition: transform 0.2s ease;
        }

        .toggle-arrow.expanded {
            transform: rotate(90deg);
        }

        .other-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--white);
        }

        .other-count {
            font-size: 14px;
            color: var(--titles);
        }

        .other-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .other-pills.expanded {
            max-height: 500px;
        }

        .other-pill {
            padding: 6px 12px;
            border-radius: 16px;
            background-color: var(--pop-on-pop);
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            h1 {
                font-size: 28px;
            }

            nav {
                gap: 16px;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-card {
                padding: 16px;
            cursor: pointer;}

            .stat-value {
                font-size: 24px;
            }
        }
    </style>
</head>

            '04': [

            'dead': [
                { name: 'Prodieco', project: 'Needs resurrection — long gap', region: 'UK', status: 'stalled', champion: 'Cathle', value: 'TBC', lastActivity: '20 Mar', source: 'Intel', note: 'POC being delegated to Junior to free up Luke/Bolaji. David asked about status on Monday. Eventually to transition to Bernardo.', timeline: ['20 Mar — POC delegated to Junior. David asked for status.', 'Mar 2026 — Friendly contact but ship may have sailed.'] },
                { name: 'Sintana', project: 'Jeff postponed meeting', region: 'US', status: 'stalled', champion: 'Jeff', value: '£100K', lastActivity: '18 Mar', source: 'Call transcript', note: 'Danny chasing. Meeting postponed to another week.', timeline: ['18 Mar — Meeting postponed. Danny chasing.'] }
            ]
        };

        const otherAccounts = ['Elra',  'Arcmont', 'Armourcap', 'Armstrong World Industries', 'Azets', 'Brighthouse Financial', 'Cambrex', 'Capita', 'Carter\'s', 'Cerity Partners', 'Corus International', 'Covista', 'Crane NXT', 'CSG Systems', 'DVC', 'East West Bank', 'Escentric', 'Evercore', 'EWOB', 'Hexion', 'Ketjen', 'Korn Ferry', 'Lazard', 'Manning Napier', 'Mission Produce', 'Moelis & Company', 'Momentive', 'Novant Health', 'Officiate', 'OneRock', 'Paragon', 'Port of Seattle', 'Porto Seguro', 'SJP', 'Suvoda', 'Suzano', 'Renner', 'IRB(RE)', 'T-Mobile', 'TBC Bank', 'The Trade Desk', 'TP ICAP', 'Vesuvius', 'Virgin Media O2', 'Vodafone', 'Wayfair', 'Weatherford', 'Woodward', 'WTW', 'Agendia NV', 'Ascential Technologies', 'Bain & Company', 'Optima Health', 'Pacific Life', 'SASOL'];

        let filteredAccounts = JSON.parse(JSON.stringify(allAccounts));
        let currentSort = { column: null, asc: true };
        let activeStageFilters = new Set();
        let atRiskFilter = false;
        let activeRegionFilter = 'all';
        let searchTerm = '';

        function getSourceClass(source) {
            if (source === 'Intel') return 'source-intel';
            if (source === 'Call transcript') return 'source-call';
            if (source === 'WhatsApp') return 'source-whatsapp';
            if (source === 'Email') return 'source-email';
            return 'source-intel';
        }

        function getStatusClass(status) {
            if (status === 'active') return 'status-active';
            if (status === 'at-risk' || status === 'stalled') return 'status-at-risk';
            return 'status-dead';
        }

        function applyFilters() {
            filteredAccounts = JSON.parse(JSON.stringify(allAccounts));

            Object.keys(filteredAccounts).forEach(stage => {
                filteredAccounts[stage] = filteredAccounts[stage].filter(account => {
                    const matchesStage = activeStageFilters.size === 0 || activeStageFilters.has(stage);
                    const matchesRegion = activeRegionFilter === 'all' || account.region === activeRegionFilter;
                    const matchesSearch = searchTerm === '' ||
                        account.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        account.project.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        account.champion.toLowerCase().includes(searchTerm.toLowerCase());

                    return matchesStage && matchesRegion && matchesSearch;
                });
            });

            if (currentSort.column) {
                applySorting();
            }
            render();
        }

        function applySorting() {
            const column = currentSort.column;
            const asc = currentSort.asc;

            Object.keys(filteredAccounts).forEach(stage => {
                filteredAccounts[stage].sort((a, b) => {
                    let aVal = a[column];
                    let bVal = b[column];

                    if (typeof aVal === 'string') {
                        aVal = aVal.toLowerCase();
                        bVal = bVal.toLowerCase();
                    }

                    if (aVal < bVal) return asc ? -1 : 1;
                    if (aVal > bVal) return asc ? 1 : -1;
                    return 0;
                });
            });
        }

        function toggleSort(column) {
            if (currentSort.column === column) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.column = column;
                currentSort.asc = true;
            }
            applyFilters();
        }

        function renderTableHeader() {
            const sortIndicator = (col) => {
                if (currentSort.column !== col) return '';
                return `<span class="sort-indicator">${currentSort.asc ? '▲' : '▼'}</span>`;
            };

            return `
                <tr class="table-header">
                    <th onclick="toggleSort('name')">Account ${sortIndicator('name')}</th>
                    <th onclick="toggleSort('project')">Project ${sortIndicator('project')}</th>
                    <th onclick="toggleSort('region')">Region ${sortIndicator('region')}</th>
                    <th onclick="toggleSort('value')">Value ${sortIndicator('value')}</th>
                    <th onclick="toggleSort('champion')">Advisor ${sortIndicator('champion')}</th>
                    <th onclick="toggleSort('lastActivity')">Last ${sortIndicator('lastActivity')}</th>
                    <th onclick="toggleSort('source')">Source ${sortIndicator('source')}</th>
                </tr>
            `;
        }

        function renderAccount(account, stage) {
            const statusClass = getStatusClass(account.status);
            const sourceClass = getSourceClass(account.source);

            return `
                <tbody class="account-table">
                    <tr class="account-row" onclick="toggleDetails(this)">
                        <td class="row-cell account-name" data-label="Account">
                            <span class="status-dot ${statusClass}"></span>${account.name}
                        </td>
                        <td class="row-cell account-project" data-label="Project">${account.project}</td>
                        <td class="row-cell account-region" data-label="Region">${account.region}</td>
                        <td class="row-cell account-value" data-label="Value">${account.value}</td>
                        <td class="row-cell account-advisor" data-label="Advisor">${account.champion}</td>
                        <td class="row-cell account-last" data-label="Last">${account.lastActivity}</td>
                        <td class="row-cell account-source" data-label="Source">
                            <span class="source-pill ${sourceClass}">${account.source}</span>
                        </td>
                    </tr>
                    <tr class="details-row">
                        <td colspan="7">
                            <div class="details-panel">
                                <div class="details-content">
                                    <div class="detail-grid">
                                        <div class="detail-grid-item">
                                            <div class="detail-grid-label">Champion / Advisor</div>
                                            <div class="detail-grid-value">${account.champion}</div>
                                        </div>
                                        <div class="detail-grid-item">
                                            <div class="detail-grid-label">Region</div>
                                            <div class="detail-grid-value">${account.region || '—'}</div>
                                        </div>
                                        <div class="detail-grid-item">
                                            <div class="detail-grid-label">Deal Value</div>
                                            <div class="detail-grid-value">${account.value}</div>
                                        </div>
                                        <div class="detail-grid-item">
                                            <div class="detail-grid-label">Source</div>
                                            <div class="detail-grid-value">${account.source}</div>
                                        </div>
                                        <div class="detail-grid-item">
                                            <div class="detail-grid-label">Last Activity</div>
                                            <div class="detail-grid-value">${account.lastActivity}</div>
                                        </div>
                                        <div class="detail-grid-item">
                                            <div class="detail-grid-label">Status</div>
                                            <div class="detail-grid-value"><span class="status-dot ${getStatusClass(account.status)}"></span>${account.status.charAt(0).toUpperCase() + account.status.slice(1)}</div>
                                        </div>
                                    </div>
                                    <div class="detail-note">
                                        <div class="detail-label">Note</div>
                                        <div class="detail-text">${account.note}</div>
                                    </div>
                                    <div class="timeline">
                                        <div class="detail-label">Activity Timeline</div>
                                        ${account.timeline.map(item => `<div class="timeline-item"><div class="timeline-text">${item}</div></div>`).join('')}
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            `;
        }

        function toggleDetails(row) {
            const panel = row.nextElementSibling.querySelector('.details-panel');
            panel.classList.toggle('expanded');
        }

        function calculateStats() {
            let totalActive = 0;
            let preCommercial = 0;
            let commercial = 0;
            let atRisk = 0;
            let stalledDead = 0;

            Object.keys(filteredAccounts).forEach(stage => {
                filteredAccounts[stage].forEach(account => {
                    if (account.status === 'dead' || account.status === 'stalled') {
                        stalledDead++;
                    } else {
                        totalActive++;
                        if (['01', '02', '03'].includes(stage)) preCommercial++;
                        if (['04', '05'].includes(stage)) commercial++;
                    }
                    if (account.status === 'at-risk') atRisk++;
                });
            });

            document.getElementById('statTotalActive').textContent = totalActive;
            document.getElementById('statPreCommercial').textContent = preCommercial;
            document.getElementById('statCommercial').textContent = commercial;
            document.getElementById('statAtRisk').textContent = atRisk;
            document.getElementById('statStalledDead').textContent = stalledDead;
        }

        function render() {
            const container = document.getElementById('stagesContainer');
            let html = '';

            const stageOrder = ['05', '04', '03', '02', '01', 'dead'];
            stageOrder.forEach(stage => {
                const accounts = filteredAccounts[stage];
                if (accounts.length === 0) return;

                const color = stageColors[stage];
                const name = stageNames[stage];

                html += `
                    <div class="stage-section">
                        <div class="stage-header">
                            <div class="stage-stripe" style="background-color: ${color}"></div>
                            <div class="stage-title">${name}</div>
                            <div class="stage-count">(${accounts.length})</div>
                        </div>
                        <table class="accounts-table">
                            ${renderTableHeader()}
                            ${accounts.map(acc => renderAccount(acc, stage)).join('')}
                        </table>
                    </div>
                `;
            });

            container.innerHTML = html;
            calculateStats();
        }

        function renderOther() {
            const container = document.getElementById('otherPills');
            container.innerHTML = otherAccounts.map(name => `<div class="other-pill">${name}</div>`).join('');
            document.getElementById('otherCount').textContent = `(${otherAccounts.length})`;
        }

        document.getElementById('otherToggle').addEventListener

        function updatePillStates() {
            document.querySelectorAll('[data-filter="stage"]').forEach(btn => {
                const value = btn.dataset.value;
                if (activeStageFilters.has(value)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function clearStatCards() {
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
            });
        }

        function setStatCardActive(index) {
            clearStatCards();
            const cards = document.querySelectorAll('.stat-card');
            if (cards[index]) {
                cards[index].classList.add('active');
            }
        }

        document.getElementById('otherToggle').addEventListener('click', () => {
            const pills = document.getElementById('otherPills');
            const arrow = document.getElementById('otherArrow');
            pills.classList.toggle('expanded');
            arrow.classList.toggle('expanded');
        });

        document.querySelectorAll('[data-filter="stage"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const value = e.target.dataset.value;
                if (e.target.classList.contains('active')) {
                    e.target.classList.remove('active');
                    activeStageFilters.delete(value);
                } else {
                    e.target.classList.add('active');
                    activeStageFilters.add(value);
                }
                applyFilters();
            });
        });

        document.querySelectorAll('[data-filter="region"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('[data-filter="region"]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                activeRegionFilter = e.target.dataset.value;
                applyFilters();
            });
        // Stat card click handlers
        document.querySelector('.stats-bar').addEventListener('click', (e) => {
            const card = e.target.closest('.stat-card');
            if (!card) return;
            
            const cards = document.querySelectorAll('.stat-card');
            const index = Array.from(cards).indexOf(card);
            
            if (index === 0) {
                // Total Active - clear filters
                activeStageFilters.clear();
                atRiskFilter = false;
                clearStatCards();
                setStatCardActive(0);
                updatePillStates();
                applyFilters();
            } else if (index === 1) {
                // Pre-Commercial
                activeStageFilters.clear();
                activeStageFilters.add('01');
                activeStageFilters.add('02');
                activeStageFilters.add('03');
                atRiskFilter = false;
                setStatCardActive(1);
                updatePillStates();
                applyFilters();
            } else if (index === 2) {
                // Commercial
                activeStageFilters.clear();
                activeStageFilters.add('04');
                activeStageFilters.add('05');
                atRiskFilter = false;
                setStatCardActive(2);
                updatePillStates();
                applyFilters();
            } else if (index === 3) {
                // At Risk
                activeStageFilters.clear();
                atRiskFilter = !atRiskFilter;
                if (atRiskFilter) {
                    setStatCardActive(3);
                } else {
                    clearStatCards();
                }
                updatePillStates();
                applyFilters();
            } else if (index === 4) {
                // Stalled/Dead
                activeStageFilters.clear();
                activeStageFilters.add('dead');
                atRiskFilter = false;
                setStatCardActive(4);
                updatePillStates();
                applyFilters();
            }
        });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            applyFilters();
        });

        render();
        renderOther();
    </script>
</body>
</html>
